name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Qo'lda ham ishga tushirish mumkin
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Kodni olish
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. JDK 17 o'rnatish (Android Gradle 8+ uchun kerak)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. gradlew ga ruxsat berish
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Faqat debug APK build qilish (tez, sign shart emas)
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # 5. APK ni artifact sifatida saqlash (yuklab olish uchun)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TVWebApp-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
